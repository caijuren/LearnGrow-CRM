# LearnGrow CRM Nginx 反向代理配置示例（可选）
# 如果你想通过 80 端口/域名访问，可以将此配置添加到你的现有 Nginx 中
# 使用方法：
# 1. 将此文件复制到 /etc/nginx/sites-available/learngrow-crm
# 2. 修改 server_name 为你的域名
# 3. 创建软链接: ln -s /etc/nginx/sites-available/learngrow-crm /etc/nginx/sites-enabled/
# 4. 测试配置: nginx -t
# 5. 重启 Nginx: systemctl restart nginx

server {
    listen 80;
    server_name your-domain.com;  # 改成你的域名或服务器IP

    client_max_body_size 50M;

    location / {
        proxy_pass http://127.0.0.1:3456;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    access_log /var/log/nginx/learngrow-crm-access.log;
    error_log /var/log/nginx/learngrow-crm-error.log;
}
